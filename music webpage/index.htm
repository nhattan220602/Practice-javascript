<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Music Webpage - Test</title>
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <img src="assets/images/1583151.webp" alt="Brand logo" class="logo">
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">SPECIFICATIONS</a></li>
                <li><a href="#">PRODUCTS</a></li>
                <li><a href="#">CONNECT</a></li>
            </ul>
        </nav>
    </div>
    <div class="content">
        <div class="left-col">
            <h1>THE <br>REAL</br> SOUND</h1>
            <p id="songTitle">Ribs</p>
        </div>
        <div class="right-col">
            <img src="assets/images/play_circle_200dp_000000_FILL0_wght400_GRAD0_opsz48.png" alt="Play or pause" id="icon">
            <button id="prevButton" title="Previous Song">Prev</button>
            <button id="nextButton" title="Next Song"></button>
        </div>
    </div>

    <div class="controls">
        <div class="seek-control">
            <label for="seekSlider">Progress</label>
            <input type="range" id="seekSlider" min="0" max="100" step="1" value="0">
            <p id="timeLabel">00:00 / 00:00</p>
        </div>
        <div class="volume-control">
            <label for="volumeSlider">Volume</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <ul id="playlist" class="playlist"></ul>
    <audio id="mySong"></audio>
    <script src="script.js"></script>
</body>
</html>
